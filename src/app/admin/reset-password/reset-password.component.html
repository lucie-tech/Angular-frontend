<div class="reset-container">
    <div class="reset-box">
        <h2>Create New Password</h2>
        <p class="subtitle">Please enter your new password below</p>

        <div *ngIf="!success">
            <form (ngSubmit)="onSubmit()">
                <div class="input-group">
                    <input type="password" [(ngModel)]="newPassword" name="newPassword" placeholder="New Password"
                        required>
                </div>
                <div class="input-group">
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Confirm Password" required>
                </div>
                <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
                <button type="submit" class="reset-btn" [disabled]="loading">
                    {{ loading ? 'Resetting...' : 'Reset Password' }}
                </button>
            </form>

            <div class="back-to-login">
                <a routerLink="/admin/login">← Back to Login</a>
            </div>
        </div>

        <div *ngIf="success" class="success-box">
            <div class="success-icon">✓</div>
            <h3>Password Reset Successful!</h3>
            <p>Your password has been changed successfully.</p>
            <p class="note">You can now login with your new password</p>
            <a routerLink="/admin/login" class="back-btn">Login Now</a>
        </div>
    </div>
</div>
