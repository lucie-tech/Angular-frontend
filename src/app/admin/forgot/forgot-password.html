<div class="forgot-container">
    <div class="forgot-box">
        <div class="logo">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password</p>
        </div>

        <div *ngIf="!submitted">
            <form (ngSubmit)="onSubmit()">
                <div class="input-group">
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Email address" required>
                </div>
                <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
                <div class="success" *ngIf="successMessage">{{ successMessage }}</div>
                <button type="submit" [disabled]="loading" class="reset-btn">
                    {{ loading ? 'Sending...' : 'Send Reset Link' }}
                </button>
            </form>

            <div class="back-to-login">
                <a routerLink="/admin/login">← Back to Login</a>
            </div>
        </div>

        <div *ngIf="submitted" class="success-box">
            <div class="success-icon">✓</div>
            <h3>Check Your Email</h3>
            <p>We've sent a password reset link to <strong>{{ email }}</strong></p>
            <p class="note">Please check your inbox and spam folder</p>
            <a routerLink="/admin/login" class="back-btn">Return to Login</a>
        </div>
    </div>
</div>
