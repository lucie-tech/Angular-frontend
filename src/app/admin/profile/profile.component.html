<div class="profile-container">
    <div class="profile-card">

        <div class="profile-header">
            <div class="avatar">
                <span class="avatar-icon">👤</span>
            </div>
            <div class="header-text">
                <h2>Admin Profile</h2>
                <p>Manage your account settings</p>
            </div>
            <button class="close-btn" type="button" (click)="closeForm()">✕</button>
        </div>

        <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

        <form (ngSubmit)="updateProfile()">

            <div class="form-section">
                <h3>Basic Information</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" [(ngModel)]="admin.name" name="name" required />
                </div>
            </div>

            <hr />

            <div class="form-section">
                <h3>Security</h3>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input [type]="showNewPassword ? 'text' : 'password'" [(ngModel)]="passwordForm.newPassword"
                            name="newPassword" />
                        <button type="button" class="eye-btn" (click)="toggleNewPassword()">
                            {{ showNewPassword ? '🙈' : '👁️' }}
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input [type]="showConfirmPassword ? 'text' : 'password'"
                            [(ngModel)]="passwordForm.confirmPassword" name="confirmPassword" />
                        <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
                            {{ showConfirmPassword ? '🙈' : '👁️' }}
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn" [disabled]="loading">
                    {{ loading ? 'Updating...' : 'Update Profile' }}
                </button>
            </div>

        </form>

    </div>
</div>
